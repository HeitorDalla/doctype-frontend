<div class="login-wrapper">
    <div class="login-card">
  
      <!-- Ícone do Doc.type -->
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
  
      <h1 class="titulo">Doc.type</h1>
      <p class="subtitulo">Acesse o sistema de registro de documentos</p>
  
      <div class="formulario">
  
        <!-- Campo Email -->
        <div class="campo">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              type="email"
              placeholder="exemplo@doc.type.com"
              [(ngModel)]="email"
              name="email"
            />
          </div>
        </div>
  
        <!-- Campo Senha -->
        <div class="campo">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="senha"
              type="password"
              placeholder="••••••••"
              [(ngModel)]="senha"
              name="senha"
            />
          </div>
        </div>
  
        <!-- Botão Entrar -->
        <button class="btn-entrar" (click)="entrar()" [disabled]="carregando || !email || !senha">
          <span *ngIf="!carregando">Entrar</span>
          <span *ngIf="carregando" class="spinner"></span>
        </button>
  
      </div>
    </div>
  </div>
