<header class="page-header">
  <h1>Relatório</h1>
</header>

<section class="card report-card">
  <form class="filters-grid" [formGroup]="form" (ngSubmit)="buscar()">
    <label>Nº Protocolo<input type="text" formControlName="protocolo" placeholder="001" /></label>
    <label>
      Tipo
      <select formControlName="tipo">
        <option value="">Todos</option>
        <option *ngFor="let tipo of tiposDocumento" [value]="tipo.nome">{{ tipo.nome }}</option>
      </select>
    </label>
    <label>
      Status
      <select formControlName="status">
        <option value="">Todos</option>
        <option *ngFor="let status of statusOpcoes" [value]="status">{{ status }}</option>
      </select>
    </label>
    <label>Nome<input type="text" formControlName="nome" placeholder="Contrato" /></label>
    <label>Remetente<input type="text" formControlName="remetente" placeholder="Nome ou email" /></label>
    <label>Data inicial<input type="date" formControlName="dataInicio" /></label>
    <label>Data final<input type="date" formControlName="dataFim" /></label>
    <label>Data<input type="date" formControlName="data" /></label>
    <div class="actions bottom-right">
      <button class="primary-button" type="submit">Buscar</button>
    </div>
  </form>
</section>

<section class="card table-card">
  <table>
    <thead>
      <tr>
        <th>Protocolo</th>
        <th>Nome</th>
        <th>Data</th>
        <th>Tipo</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let documento of documentos">
        <td>{{ documento.protocolo }}</td>
        <td>{{ documento.nome }}</td>
        <td>{{ documento.criadoEm | date: 'dd/MM/yyyy' }}</td>
        <td>{{ documento.tipoArquivo }}</td>
        <td><span class="status status-yellow">{{ documento.status }}</span></td>
      </tr>
    </tbody>
  </table>
</section>

<div class="auth-message" *ngIf="message">{{ message }}</div>
