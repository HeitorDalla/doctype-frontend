<div class="page-wrapper">
  <aside class="sidebar">
    <div class="brand-block">
      <div class="brand">Doc.type</div>
      <p>Gestão documental</p>
    </div>

    <nav>
      <span class="nav-section">Geral</span>
      <a routerLink="/dashboard" routerLinkActive="active">Painel</a>
      <a *ngIf="session.isAdministrator" routerLink="/usuario" routerLinkActive="active">Cadastro de Usuário</a>

      <span class="nav-section">Documentos</span>
      <a routerLink="/tipo-documento" routerLinkActive="active">Cadastro de Tipo de Documento</a>
      <a routerLink="/cadastrar-documento" routerLinkActive="active">Cadastro de Documento</a>
      <a routerLink="/consulta-documento" routerLinkActive="active">Consulta de Documentos</a>

      <span class="nav-section">Dados</span>
      <a routerLink="/relatorios" routerLinkActive="active">Relatórios</a>
    </nav>
    <div class="sidebar-footer">
      <span>{{ session.currentUserName }}</span>
      <button class="primary-button logout-button" type="button" (click)="logout()">Sair</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
